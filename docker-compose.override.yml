services:
  db:
    ports:
      - "5432:5432"

  backend:
    command: ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    working_dir: /app
    volumes:
      - ./backend:/app
      - appdata:${APP_DATA_ROOT:-/app/data}
    ports:
      - "8000:8000"

  frontend-dev:
    profiles:
      - dev
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-c", "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"]
    environment:
      VITE_API_BASE: http://localhost:8000/api
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
