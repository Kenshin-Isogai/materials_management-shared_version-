name: Deploy GCP

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment name
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      image_tag:
        description: Image tag to publish
        required: true
        default: manual
        type: string
      deploy_target:
        description: Which part to deploy
        required: true
        default: full
        type: choice
        options:
          - backend
          - frontend
          - full

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_ARTIFACT_REGISTRY: ${{ vars.GCP_ARTIFACT_REGISTRY }}
      BACKEND_SERVICE_NAME: ${{ vars.BACKEND_SERVICE_NAME }}
      FRONTEND_SERVICE_NAME: ${{ vars.FRONTEND_SERVICE_NAME }}
      INSTANCE_CONNECTION_NAME: ${{ vars.INSTANCE_CONNECTION_NAME }}
      GCS_BUCKET: ${{ vars.GCS_BUCKET }}
      GCS_OBJECT_PREFIX: ${{ vars.GCS_OBJECT_PREFIX }}
      BACKEND_URL: ${{ vars.BACKEND_URL }}
      FRONTEND_URL: ${{ vars.FRONTEND_URL }}
      DATABASE_URL_SECRET_NAME: ${{ vars.DATABASE_URL_SECRET_NAME }}
      JWT_SIGNING_ALGORITHMS: ${{ vars.JWT_SIGNING_ALGORITHMS }}
      OIDC_REQUIRE_EMAIL_VERIFIED: ${{ vars.OIDC_REQUIRE_EMAIL_VERIFIED }}
      GOOGLE_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GOOGLE_WORKLOAD_IDENTITY_PROVIDER }}
      GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
      BACKEND_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.BACKEND_RUNTIME_SERVICE_ACCOUNT }}
      FRONTEND_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.FRONTEND_RUNTIME_SERVICE_ACCOUNT }}
      MIGRATE_RUNTIME_SERVICE_ACCOUNT: ${{ secrets.MIGRATE_RUNTIME_SERVICE_ACCOUNT }}
      IDENTITY_PLATFORM_API_KEY: ${{ secrets.IDENTITY_PLATFORM_API_KEY }}
      IMAGE_TAG: ${{ inputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GOOGLE_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GOOGLE_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Artifact Registry auth
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build backend image
        if: ${{ inputs.deploy_target == 'backend' || inputs.deploy_target == 'full' }}
        run: |
          docker build \
            -t "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REGISTRY}/materials-backend:${IMAGE_TAG}" \
            ./backend

      - name: Push backend image
        if: ${{ inputs.deploy_target == 'backend' || inputs.deploy_target == 'full' }}
        run: docker push "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REGISTRY}/materials-backend:${IMAGE_TAG}"

      - name: Run backend migration job
        if: ${{ inputs.deploy_target == 'backend' || inputs.deploy_target == 'full' }}
        run: |
          gcloud run jobs deploy materials-management-backend-migrate \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --image "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REGISTRY}/materials-backend:${IMAGE_TAG}" \
            --service-account "${MIGRATE_RUNTIME_SERVICE_ACCOUNT}" \
            --set-cloudsql-instances "${INSTANCE_CONNECTION_NAME}" \
            --set-secrets "DATABASE_URL=${DATABASE_URL_SECRET_NAME}:latest" \
            --set-env-vars "APP_RUNTIME_TARGET=cloud_run,AUTO_MIGRATE_ON_STARTUP=0" \
            --command uv \
            --args run \
            --args alembic \
            --args upgrade \
            --args head
          gcloud run jobs execute materials-management-backend-migrate \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --wait

      - name: Deploy backend service
        if: ${{ inputs.deploy_target == 'backend' || inputs.deploy_target == 'full' }}
        run: |
          BACKEND_ENV_VARS="APP_RUNTIME_TARGET=cloud_run,AUTO_MIGRATE_ON_STARTUP=0,STRUCTURED_LOGGING=1,WEB_CONCURRENCY=2,DB_POOL_SIZE=5,DB_MAX_OVERFLOW=10,DB_POOL_TIMEOUT=30,DB_POOL_RECYCLE_SECONDS=1800,MAX_UPLOAD_BYTES=33554432,HEAVY_REQUEST_TARGET_SECONDS=60,CLOUD_RUN_CONCURRENCY_TARGET=10,STORAGE_BACKEND=gcs,GCS_BUCKET=${GCS_BUCKET},GCS_OBJECT_PREFIX=${GCS_OBJECT_PREFIX},INSTANCE_CONNECTION_NAME=${INSTANCE_CONNECTION_NAME},AUTH_MODE=oidc_enforced,RBAC_MODE=rbac_enforced,JWT_VERIFIER=jwks,JWT_SIGNING_ALGORITHMS=${JWT_SIGNING_ALGORITHMS},OIDC_PROVIDER=identity_platform,OIDC_EXPECTED_ISSUER=https://securetoken.google.com/${GCP_PROJECT_ID},OIDC_EXPECTED_AUDIENCE=${GCP_PROJECT_ID},OIDC_JWKS_URL=https://www.googleapis.com/service_accounts/v1/jwk/securetoken@system.gserviceaccount.com,OIDC_REQUIRE_EMAIL_VERIFIED=${OIDC_REQUIRE_EMAIL_VERIFIED},DIAGNOSTICS_AUTH_ROLE=admin"
          if [ -n "${FRONTEND_URL}" ]; then
            BACKEND_ENV_VARS="${BACKEND_ENV_VARS},CORS_ALLOWED_ORIGINS=${FRONTEND_URL},FRONTEND_PUBLIC_BASE_URL=${FRONTEND_URL}"
          fi
          if [ -n "${BACKEND_URL}" ]; then
            BACKEND_ENV_VARS="${BACKEND_ENV_VARS},BACKEND_PUBLIC_BASE_URL=${BACKEND_URL}"
          fi
          gcloud run deploy "${BACKEND_SERVICE_NAME}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --image "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REGISTRY}/materials-backend:${IMAGE_TAG}" \
            --service-account "${BACKEND_RUNTIME_SERVICE_ACCOUNT}" \
            --allow-unauthenticated \
            --set-cloudsql-instances "${INSTANCE_CONNECTION_NAME}" \
            --set-secrets "DATABASE_URL=${DATABASE_URL_SECRET_NAME}:latest" \
            --set-env-vars "${BACKEND_ENV_VARS}" \
            --concurrency 10 \
            --cpu 1 \
            --memory 1Gi \
            --timeout 300 \
            --min-instances 0 \
            --max-instances 10

      - name: Build frontend image
        if: ${{ inputs.deploy_target == 'frontend' || inputs.deploy_target == 'full' }}
        run: |
          if [ -z "${BACKEND_URL}" ]; then
            echo "BACKEND_URL must be set in the GitHub Environment before deploying frontend."
            exit 1
          fi
          docker build \
            -t "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REGISTRY}/materials-frontend:${IMAGE_TAG}" \
            --build-arg "VITE_API_BASE=${BACKEND_URL}/api" \
            --build-arg "VITE_IDENTITY_PLATFORM_API_KEY=${IDENTITY_PLATFORM_API_KEY}" \
            ./frontend

      - name: Push frontend image
        if: ${{ inputs.deploy_target == 'frontend' || inputs.deploy_target == 'full' }}
        run: docker push "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REGISTRY}/materials-frontend:${IMAGE_TAG}"

      - name: Deploy frontend service
        if: ${{ inputs.deploy_target == 'frontend' || inputs.deploy_target == 'full' }}
        run: |
          gcloud run deploy "${FRONTEND_SERVICE_NAME}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --image "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REGISTRY}/materials-frontend:${IMAGE_TAG}" \
            --service-account "${FRONTEND_RUNTIME_SERVICE_ACCOUNT}" \
            --allow-unauthenticated \
            --port 80 \
            --concurrency 50 \
            --cpu 1 \
            --memory 512Mi \
            --timeout 60 \
            --min-instances 0 \
            --max-instances 10
