services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_RUNTIME_TARGET: local
      APP_DATA_ROOT: ${APP_DATA_ROOT}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      AUTO_MIGRATE_ON_STARTUP: 0
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-4}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
    volumes:
      - appdata:${APP_DATA_ROOT:-/app/data}
    depends_on:
      db:
        condition: service_healthy
    command:
      - sh
      - -c
      - uv run alembic upgrade head && uv run gunicorn main:app -k uvicorn.workers.UvicornWorker -w ${WEB_CONCURRENCY:-4} -b 0.0.0.0:8000 --access-logfile - --error-logfile -
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  nginx:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  pgdata:
  appdata:
